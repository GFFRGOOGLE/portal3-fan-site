<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>Portal 3 — Fan Edition</title>
    <style>
        /* === ОБЩИЕ СТИЛИ === */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { overflow: hidden; background: #0b0e14; font-family: 'Segoe UI', Arial, sans-serif; touch-action: none; }
        canvas { display: block; }

        /* === ГЛАВНЫЙ ЭКРАН (как раньше) === */
        #mainMenu {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: radial-gradient(ellipse at center, #1a1f2a 0%, #0b0e14 100%);
            z-index: 100;
            transition: opacity 0.8s ease;
            user-select: none;
            pointer-events: none;
        }
        #mainMenu.hidden { opacity: 0; pointer-events: none; }
        #mainMenu .bg-particles {
            position: absolute; top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 0;
        }
        #mainMenu .content {
            position: relative;
            z-index: 1;
            text-align: center;
            pointer-events: auto;
        }
        #mainMenu .logo {
            font-size: 5rem;
            font-weight: 900;
            color: #f5a623;
            text-shadow: 0 0 40px #f5a62388, 0 0 80px #f5a62344;
            letter-spacing: 6px;
            margin-bottom: 5px;
            animation: glowPulse 2.5s infinite alternate;
        }
        @keyframes glowPulse {
            0% { text-shadow: 0 0 30px #f5a62366, 0 0 60px #f5a62333; }
            100% { text-shadow: 0 0 60px #f5a623aa, 0 0 120px #f5a62355; }
        }
        #mainMenu .subtitle {
            font-size: 1.3rem;
            color: #8af0ff;
            letter-spacing: 3px;
            margin-bottom: 5px;
            font-weight: 300;
        }
        #mainMenu .version {
            font-size: 0.9rem;
            color: #888;
            margin-bottom: 30px;
            letter-spacing: 2px;
        }
        #mainMenu .menu-buttons {
            display: flex;
            flex-direction: column;
            gap: 12px;
            width: 260px;
            margin: 0 auto;
        }
        #mainMenu .menu-buttons button {
            background: rgba(255,255,255,0.05);
            border: 2px solid #f5a62355;
            color: #e0e0e0;
            padding: 14px 0;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            width: 100%;
            backdrop-filter: blur(4px);
            letter-spacing: 2px;
            text-transform: uppercase;
            pointer-events: auto;
        }
        #mainMenu .menu-buttons button:hover {
            background: #f5a623;
            color: #0b0e14;
            border-color: #f5a623;
            transform: scale(1.02);
            box-shadow: 0 0 30px #f5a62366;
        }
        #mainMenu .menu-buttons button.primary {
            background: #f5a623;
            color: #0b0e14;
            border-color: #f5a623;
            box-shadow: 0 0 30px #f5a62344;
        }
        #mainMenu .menu-buttons button.primary:hover {
            background: #ffc107;
            box-shadow: 0 0 50px #f5a62388;
        }
        #mainMenu .menu-buttons button.danger {
            color: #ff6666;
            border-color: #ff444455;
        }
        #mainMenu .menu-buttons button.danger:hover {
            background: #ff4444;
            color: #fff;
            border-color: #ff4444;
        }
        #mainMenu .footer-text {
            margin-top: 40px;
            font-size: 0.8rem;
            color: #555;
            letter-spacing: 1px;
            pointer-events: none;
        }
        #btnVR {
            background: rgba(100,100,255,0.2);
            border-color: #8888ff55;
            color: #aaaaff;
        }
        #btnVR:hover {
            background: #8888ff;
            color: #0b0e14;
            border-color: #8888ff;
        }

        /* === ИГРОВОЙ ИНТЕРФЕЙС === */
        #ui {
            position: absolute;
            top: 20px; left: 20px;
            color: #fff;
            background: rgba(0,0,0,0.6);
            padding: 10px 20px;
            border-radius: 10px;
            border-left: 4px solid #f5a623;
            pointer-events: none;
            z-index: 10;
            font-size: 1.1rem;
            display: none;
        }
        #message {
            position: absolute;
            bottom: 100px;
            left: 0; width: 100%;
            text-align: center;
            color: #fff;
            font-size: 1.4rem;
            background: rgba(0,0,0,0.5);
            padding: 10px;
            pointer-events: none;
            z-index: 10;
            display: none;
        }
        #crosshair {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            color: rgba(255,255,255,0.3);
            font-size: 2rem;
            pointer-events: none;
            z-index: 10;
            text-shadow: 0 0 5px #000;
            display: none;
        }
        .level-complete {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 20;
        }
        .level-complete.show { display: flex; }
        .level-complete h2 { font-size: 3rem; color: #f5a623; text-shadow: 0 0 40px #f5a62388; margin-bottom: 10px; }
        .level-complete p { font-size: 1.2rem; color: #fff; margin-bottom: 25px; }
        .level-complete button {
            background: #f5a623; color: #0b0e14; border: none;
            padding: 14px 50px; border-radius: 60px; font-size: 1.4rem; font-weight: 700;
            cursor: pointer; transition: 0.3s; box-shadow: 0 0 30px #f5a62366;
        }
        .level-complete button:hover { transform: scale(1.05); background: #ffc107; }
        #controls-hint {
            position: absolute;
            bottom: 20px;
            left: 0; width: 100%;
            text-align: center;
            color: #aaa;
            font-size: 0.8rem;
            pointer-events: none;
            z-index: 10;
            display: none;
        }

        /* === КНОПКИ ПОРТАЛОВ (HUD) === */
        .portal-buttons {
            position: absolute;
            bottom: 100px;
            right: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
            z-index: 10;
            pointer-events: none;
        }
        .portal-buttons button {
            pointer-events: auto;
            width: 60px;
            height: 60px;
            border-radius: 50%;
            border: 3px solid #fff;
            font-size: 1.2rem;
            font-weight: bold;
            color: #fff;
            cursor: pointer;
            transition: 0.3s;
            text-shadow: 0 0 10px #000;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }
        .portal-buttons button.blue { background: #0066ff; border-color: #88ccff; }
        .portal-buttons button.orange { background: #ff6600; border-color: #ffaa44; }
        .portal-buttons button.purple { background: #aa44ff; border-color: #cc88ff; }
        .portal-buttons button.active { box-shadow: 0 0 30px #fff; transform: scale(1.1); }
        .portal-buttons button:active { transform: scale(0.9); }

        /* === КНОПКА ПАУЗЫ (для телефона) === */
        #pauseBtn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(0,0,0,0.6);
            border: 2px solid #f5a623;
            color: #fff;
            font-size: 1.5rem;
            padding: 8px 16px;
            border-radius: 30px;
            cursor: pointer;
            z-index: 10;
            display: none;
        }

        /* === МЕНЮ ПАУЗЫ === */
        #pauseMenu {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 50;
            backdrop-filter: blur(4px);
        }
        #pauseMenu.show { display: flex; }
        #pauseMenu h2 {
            font-size: 3rem;
            color: #f5a623;
            text-shadow: 0 0 40px #f5a62388;
            margin-bottom: 30px;
        }
        #pauseMenu .menu-buttons {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 260px;
        }
        #pauseMenu .menu-buttons button {
            background: rgba(255,255,255,0.1);
            border: 2px solid #f5a62355;
            color: #fff;
            padding: 14px 0;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }
        #pauseMenu .menu-buttons button:hover {
            background: #f5a623;
            color: #0b0e14;
        }
        #pauseMenu .menu-buttons button.danger {
            color: #ff6666;
            border-color: #ff444455;
        }
        #pauseMenu .menu-buttons button.danger:hover {
            background: #ff4444;
            color: #fff;
            border-color: #ff4444;
        }

        /* === МОБИЛЬНОЕ УПРАВЛЕНИЕ === */
        .touch-controls {
            position: absolute;
            bottom: 30px;
            left: 0;
            width: 100%;
            pointer-events: none;
            z-index: 15;
            display: none;
        }
        .touch-controls.active { display: block; }
        .touch-joystick {
            position: absolute;
            left: 30px;
            bottom: 30px;
            width: 120px;
            height: 120px;
            background: rgba(255,255,255,0.15);
            border-radius: 50%;
            border: 2px solid rgba(255,255,255,0.3);
            pointer-events: auto;
            touch-action: none;
        }
        .touch-joystick .knob {
            width: 50px;
            height: 50px;
            background: rgba(255,255,255,0.5);
            border-radius: 50%;
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
        }
        .touch-buttons {
            position: absolute;
            right: 20px;
            bottom: 30px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            pointer-events: none;
        }
        .touch-buttons button {
            pointer-events: auto;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            border: 2px solid #f5a623;
            background: rgba(20,30,40,0.8);
            color: #fff;
            font-size: 1.5rem;
            font-weight: bold;
            touch-action: none;
            user-select: none;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 20px rgba(245,166,35,0.3);
        }
        .touch-buttons .action-btn { background: rgba(255,102,0,0.8); border-color: #ff6600; }
        .touch-buttons .reset-btn {
            width: 50px;
            height: 50px;
            font-size: 1.2rem;
            background: rgba(255,0,0,0.5);
            border-color: #ff4444;
        }
        .touch-look {
            position: absolute;
            top: 0;
            right: 0;
            width: 50%;
            height: 100%;
            pointer-events: auto;
            touch-action: none;
            z-index: 5;
            background: transparent;
        }
        @media (pointer: coarse) {
            .touch-controls.active { display: block; }
            #controls-hint { display: none; }
            #pauseBtn { display: block; }
        }

        /* Индикатор гироскопа */
        #gyroIndicator {
            position: absolute;
            top: 70px;
            right: 20px;
            color: #8af0ff;
            font-size: 0.9rem;
            background: rgba(0,0,0,0.5);
            padding: 4px 12px;
            border-radius: 20px;
            border: 1px solid #8af0ff44;
            display: none;
            z-index: 10;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <!-- ===== ГЛАВНЫЙ ЭКРАН ===== -->
    <div id="mainMenu">
        <canvas class="bg-particles" id="particlesCanvas"></canvas>
        <div class="content">
            <div class="logo">PORTAL 3</div>
            <div class="subtitle">⚡ Fan Edition</div>
            <div class="version">v1.0 Ultimate</div>
            <div class="menu-buttons">
                <button class="primary" id="btnNewGame">▶ Новая игра</button>
                <button id="btnContinue">⏩ Продолжить</button>
                <button id="btnSettings">⚙ Настройки</button>
                <button id="btnVR" style="border-color:#8888ff55; color:#aaaaff;">🥽 VR</button>
                <button class="danger" id="btnExit">✕ Выход</button>
            </div>
            <div class="footer-text">© 2026 — SWILL · Aperture Science Tribute</div>
        </div>
    </div>

    <!-- ===== ИГРОВЫЕ ЭЛЕМЕНТЫ ===== -->
    <div id="ui">🎯 Кубов на месте: <span id="counter">0</span>/<span id="total">0</span> &nbsp;| Уровень <span id="levelNum">1</span></div>
    <div id="message"></div>
    <div id="crosshair">+</div>
    <div id="gyroIndicator">🔄 Гироскоп</div>
    <div id="controls-hint">WASD — движение, мышь — взгляд, Пробел — прыжок, E — взять/бросить куб, R — перезапуск</div>

    <!-- Кнопки порталов -->
    <div class="portal-buttons" id="portalButtons" style="display:none;">
        <button class="blue" id="portalBlueBtn">🔵</button>
        <button class="orange" id="portalOrangeBtn">🟠</button>
        <button class="purple" id="portalPurpleBtn">🟣</button>
    </div>

    <!-- Кнопка паузы (для телефона) -->
    <button id="pauseBtn">⏸</button>

    <!-- Меню паузы -->
    <div id="pauseMenu">
        <h2>⏸ ПАУЗА</h2>
        <div class="menu-buttons">
            <button id="pauseResume">▶ Продолжить</button>
            <button id="pauseSettings">⚙ Настройки</button>
            <button class="danger" id="pauseExit">✕ Выйти в меню</button>
        </div>
    </div>

    <!-- Экран завершения уровня -->
    <div class="level-complete" id="levelComplete">
        <h2 id="completeTitle">🎉 Уровень пройден!</h2>
        <p id="completeMsg">Отлично!</p>
        <button id="nextLevelBtn">➡️ Далее</button>
    </div>

    <!-- Мобильное управление -->
    <div class="touch-controls" id="touchControls">
        <div class="touch-joystick" id="joystick">
            <div class="knob" id="joystickKnob"></div>
        </div>
        <div class="touch-look" id="touchLook"></div>
        <div class="touch-buttons">
            <button class="action-btn" id="touchAction">E</button>
            <button id="touchJump">⬆</button>
            <button class="reset-btn" id="touchReset">↺</button>
        </div>
    </div>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // ============================================================
        //  ГЛАВНЫЙ ЭКРАН – ЧАСТИЦЫ
        // ============================================================
        const canvasParticles = document.getElementById('particlesCanvas');
        const ctxP = canvasParticles.getContext('2d');
        let particles = [];
        const PARTICLE_COUNT = 60;

        function resizeParticles() {
            canvasParticles.width = window.innerWidth;
            canvasParticles.height = window.innerHeight;
        }
        window.addEventListener('resize', resizeParticles);
        resizeParticles();

        class Particle {
            constructor() {
                this.x = Math.random() * canvasParticles.width;
                this.y = Math.random() * canvasParticles.height;
                this.size = Math.random() * 2 + 1;
                this.speedX = (Math.random() - 0.5) * 0.5;
                this.speedY = (Math.random() - 0.5) * 0.5 - 0.2;
                this.opacity = Math.random() * 0.6 + 0.2;
            }
            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                if (this.y < 0) { this.y = canvasParticles.height; this.x = Math.random() * canvasParticles.width; }
                if (this.x < 0 || this.x > canvasParticles.width) this.speedX *= -1;
            }
            draw() {
                ctxP.beginPath();
                ctxP.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                ctxP.fillStyle = `rgba(245, 166, 35, ${this.opacity})`;
                ctxP.fill();
            }
        }

        for (let i = 0; i < PARTICLE_COUNT; i++) {
            particles.push(new Particle());
        }

        function animateParticles() {
            ctxP.clearRect(0, 0, canvasParticles.width, canvasParticles.height);
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animateParticles);
        }
        animateParticles();

        // ============================================================
        //  КНОПКИ ГЛАВНОГО МЕНЮ
        // ============================================================
        const mainMenu = document.getElementById('mainMenu');
        const btnNewGame = document.getElementById('btnNewGame');
        const btnContinue = document.getElementById('btnContinue');
        const btnSettings = document.getElementById('btnSettings');
        const btnExit = document.getElementById('btnExit');
        const btnVR = document.getElementById('btnVR');

        btnContinue.addEventListener('click', () => alert('⏩ Демо-режим: загрузка последнего сохранения...'));
        btnSettings.addEventListener('click', () => alert('⚙ Настройки: звук, графика, управление (демо)'));
        btnExit.addEventListener('click', () => {
            if (confirm('Выйти из игры?')) {
                window.location.href = 'https://GFFRGOOGLE.github.io/portal3-fan-site/';
            }
        });

        // ============================================================
        //  ИНИЦИАЛИЗАЦИЯ 3D-СЦЕНЫ
        // ============================================================
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x1a1f2a);
        scene.fog = new THREE.Fog(0x1a1f2a, 30, 60);

        const camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.1, 100);
        camera.position.set(0, 1.6, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        renderer.xr.enabled = true;
        document.body.insertBefore(renderer.domElement, document.getElementById('mainMenu'));

        // Освещение
        const ambientLight = new THREE.AmbientLight(0x404060);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffeedd, 1.5);
        dirLight.position.set(10, 20, 10);
        dirLight.castShadow = true;
        dirLight.shadow.mapSize.width = 1024;
        dirLight.shadow.mapSize.height = 1024;
        const d = 20;
        dirLight.shadow.camera.left = -d;
        dirLight.shadow.camera.right = d;
        dirLight.shadow.camera.top = d;
        dirLight.shadow.camera.bottom = -d;
        dirLight.shadow.camera.near = 1;
        dirLight.shadow.camera.far = 40;
        scene.add(dirLight);

        const fillLight = new THREE.DirectionalLight(0x8888ff, 0.3);
        fillLight.position.set(-10, 5, -10);
        scene.add(fillLight);

        const gridHelper = new THREE.GridHelper(30, 20, 0xf5a623, 0x444466);
        gridHelper.position.y = -0.01;
        scene.add(gridHelper);

        // ============================================================
        //  ФИЗИКА И ИГРОВОЙ МИР
        // ============================================================
        const GRAVITY = -20;
        const JUMP_SPEED = 8;
        const MOVE_SPEED = 5;
        const PLAYER_HEIGHT = 1.8;
        const PLAYER_RADIUS = 0.5;

        const playerGroup = new THREE.Group();
        const sphereGeo = new THREE.SphereGeometry(0.5, 16, 16);
        const sphereMat = new THREE.MeshStandardMaterial({ color: 0x8af0ff, emissive: 0x225566, emissiveIntensity: 0.2 });
        const head = new THREE.Mesh(sphereGeo, sphereMat);
        head.position.y = 1.2;
        head.castShadow = true;
        playerGroup.add(head);
        const bodyGeo = new THREE.CylinderGeometry(0.4, 0.4, 1.0, 8);
        const bodyMat = new THREE.MeshStandardMaterial({ color: 0x4a6a8a });
        const body = new THREE.Mesh(bodyGeo, bodyMat);
        body.position.y = 0.5;
        body.castShadow = true;
        playerGroup.add(body);
        const eyeGeo = new THREE.SphereGeometry(0.1, 8, 8);
        const eyeMat = new THREE.MeshStandardMaterial({ color: 0xffffff });
        const eye = new THREE.Mesh(eyeGeo, eyeMat);
        eye.position.set(0.3, 1.3, 0.5);
        playerGroup.add(eye);

        playerGroup.position.set(0, 2, 0);
        scene.add(playerGroup);

        const playerPhysics = {
            velocity: new THREE.Vector3(0, 0, 0),
            onGround: false,
        };

        // ============================================================
        //  ПОРТАЛЫ (динамические)
        // ============================================================
        let portalBlue = null;
        let portalOrange = null;
        let portalPurple = null;
        let purpleTimer = 0; // для временного портала

        function createPortalMesh(color, emissiveColor, position, normal) {
            // Создаём плоскость, повёрнутую по нормали
            const geometry = new THREE.CircleGeometry(0.8, 16);
            const material = new THREE.MeshStandardMaterial({
                color: color,
                emissive: emissiveColor,
                transparent: true,
                opacity: 0.7,
                side: THREE.DoubleSide,
            });
            const mesh = new THREE.Mesh(geometry, material);
            mesh.position.copy(position);
            // Ориентируем по нормали
            const up = new THREE.Vector3(0, 1, 0);
            const quat = new THREE.Quaternion().setFromUnitVectors(up, normal.normalize());
            mesh.quaternion.copy(quat);
            mesh.castShadow = false;
            mesh.receiveShadow = false;
            scene.add(mesh);
            return mesh;
        }

        function removePortal(portal) {
            if (portal) {
                scene.remove(portal);
                return null;
            }
            return null;
        }

        function placePortal(color, type) {
            // Получаем направление взгляда
            const dir = new THREE.Vector3(0, 0, -1);
            dir.applyQuaternion(camera.quaternion);
            const start = camera.position.clone();
            const distance = 3.0;
            const pos = start.clone().add(dir.clone().multiplyScalar(distance));
            // Нормаль - направление взгляда (ставим портал перпендикулярно взгляду)
            const normal = dir.clone().negate();

            switch (type) {
                case 'blue':
                    if (portalBlue) {
                        scene.remove(portalBlue);
                        portalBlue = null;
                        document.getElementById('portalBlueBtn').classList.remove('active');
                    } else {
                        portalBlue = createPortalMesh(0x0066ff, 0x0044aa, pos, normal);
                        document.getElementById('portalBlueBtn').classList.add('active');
                    }
                    break;
                case 'orange':
                    if (portalOrange) {
                        scene.remove(portalOrange);
                        portalOrange = null;
                        document.getElementById('portalOrangeBtn').classList.remove('active');
                    } else {

        // Обновление временного портала (таймер)

        // Обработчики кнопок порталов

        // ============================================================

        // Уровень 3: два куба, две кнопки
        levels.push({

        // ============================================================
        //  ПОСТРОЕНИЕ УРОВНЯ
        // ============================================================
        let currentLevelIndex = 0;
        let levelData = null;
        let levelObjects = { platforms: [], cubes: [], buttons: [], doors: [], portalIn: null, portalOut: null, goal: null };
        let cubesData = [];
        let buttonsData = [];
        let doorsData = [];

        function buildLevel(index) {
            // Удалить старые объекты
            for (let obj of levelObjects.platforms) scene.remove(obj);
            for (let obj of levelObjects.cubes) scene.remove(obj);
            for (let obj of levelObjects.buttons) scene.remove(obj);
            for (let obj of levelObjects.doors) scene.remove(obj);
            if (levelObjects.portalIn) scene.remove(levelObjects.portalIn);
            if (levelObjects.portalOut) scene.remove(levelObjects.portalOut);
            if (levelObjects.goal) scene.remove(levelObjects.goal);
            levelObjects = { platforms: [], cubes: [], buttons: [], doors: [], portalIn: null, portalOut: null, goal: null };
            cubesData = [];
            buttonsData = [];
            doorsData = [];

            const level = levels[index];
            if (!level) {
                document.getElementById('levelComplete').classList.add('show');
                document.getElementById('completeTitle').textContent = '🏆 Игра пройдена!';

                document.getElementById('nextLevelBtn').textContent = '🔄 Начать заново';
                document.getElementById('nextLevelBtn').onclick = () => { window.location.reload(); };
                return;
            }
            levelData = level;
            currentLevelIndex = index;

            // Платформы
            for (let p of level.platforms) {
                const geo = new THREE.BoxGeometry(...p.size);
                const mat = new THREE.MeshStandardMaterial({ color: p.color, roughness: 0.7, metalness: 0.1 });
                const mesh = new THREE.Mesh(geo, mat);
                mesh.position.set(p.pos[0], p.pos[1], p.pos[2]);
                mesh.receiveShadow = true;
                mesh.castShadow = true;
                scene.add(mesh);
                levelObjects.platforms.push(mesh);
            }

            // Кубы
            for (let c of level.cubes) {
                const geo = new THREE.BoxGeometry(...c.size);
                const mat = new THREE.MeshStandardMaterial({ color: 0xf5a623, emissive: 0x553311, emissiveIntensity: 0.2 });
                const mesh = new THREE.Mesh(geo, mat);
                mesh.position.set(c.pos[0], c.pos[1], c.pos[2]);
                mesh.castShadow = true;
                mesh.receiveShadow = true;
                scene.add(mesh);
                levelObjects.cubes.push(mesh);
                cubesData.push({
                    mesh: mesh,
                    startPos: new THREE.Vector3(c.pos[0], c.pos[1], c.pos[2]),
                    size: c.size,
                    onButton: false,
                    carried: false,
                    velocity: new THREE.Vector3(0, 0, 0)
                });
            }

            // Кнопки
            for (let b of level.buttons) {
                const geo = new THREE.BoxGeometry(...b.size);
                const mat = new THREE.MeshStandardMaterial({ color: 0xff4444, emissive: 0x440000 });
                const mesh = new THREE.Mesh(geo, mat);
                mesh.position.set(b.pos[0], b.pos[1], b.pos[2]);
                mesh.receiveShadow = true;
                scene.add(mesh);
                levelObjects.buttons.push(mesh);
                buttonsData.push({
                    mesh: mesh,
                    pos: new THREE.Vector3(b.pos[0], b.pos[1], b.pos[2]),
                    size: b.size,
                    pressed: false,
                    targetDoorIndex: b.targetDoorIndex
                });
            }

            // Двери
            for (let d of level.doors) {
                const geo = new THREE.BoxGeometry(...d.size);
                const mat = new THREE.MeshStandardMaterial({ color: 0x884444, emissive: 0x220000 });
                const mesh = new THREE.Mesh(geo, mat);
                mesh.position.set(d.pos[0], d.pos[1], d.pos[2]);
                mesh.castShadow = true;
                mesh.receiveShadow = true;
                scene.add(mesh);
                levelObjects.doors.push(mesh);
                doorsData.push({
                    mesh: mesh,
                    pos: new THREE.Vector3(d.pos[0], d.pos[1], d.pos[2]),
                    size: d.size,
                    open: false,
                    buttonIndex: d.buttonIndex
                });
            }

            // Статические порталы (если есть) — мы их не используем, но оставляем на будущее

            // Цель
            const goal = level.goal;
            if (goal) {
                const goalMat = new THREE.MeshStandardMaterial({ color: 0x00ff00, emissive: 0x004400, transparent: true, opacity: 0.5 });
                const goalGeo = new THREE.BoxGeometry(...goal.size);
                const goalMesh = new THREE.Mesh(goalGeo, goalMat);
                goalMesh.position.set(goal.pos[0], goal.pos[1], goal.pos[2]);
                goalMesh.receiveShadow = true;
                scene.add(goalMesh);
                levelObjects.goal = goalMesh;
            }

            // Сброс игрока
            playerGroup.position.set(0, 2, 0);
            playerPhysics.velocity.set(0, 0, 0);
            playerPhysics.onGround = false;

            // Удаляем динамические порталы при смене уровня
            if (portalBlue) { scene.remove(portalBlue); portalBlue = null; document.getElementById('portalBlueBtn').classList.remove('active'); }
            if (portalOrange) { scene.remove(portalOrange); portalOrange = null; document.getElementById('portalOrangeBtn').classList.remove('active'); }
            if (portalPurple) { scene.remove(portalPurple); portalPurple = null; document.getElementById('portalPurpleBtn').classList.remove('active'); }

            updateUI();
            document.getElementById('levelComplete').classList.remove('show');
            document.getElementById('message').style.display = 'none';
        }

        // ============================================================
        //  УПРАВЛЕНИЕ: КЛАВИАТУРА, МЫШЬ, ГЕЙМПАД, ГИРОСКОП, VR
        // ============================================================
        let moveX = 0, moveZ = 0;
        let jumpPressed = false;
        let actionPressed = false;
        let resetPressed = false;
        let lookX = 0, lookY = 0;

        // Клавиатура
        const keys = { w: false, a: false, s: false, d: false, space: false, e: false, r: false };
        document.addEventListener('keydown', (e) => {
            const key = e.key;
            if (key === 'w' || key === 'W') keys.w = true;
            if (key === 'a' || key === 'A') keys.a = true;
            if (key === 's' || key === 'S') keys.s = true;
            if (key === 'd' || key === 'D') keys.d = true;
            if (key === ' ') { keys.space = true; e.preventDefault(); }
            if (key === 'e' || key === 'E') { keys.e = true; e.preventDefault(); }
            if (key === 'r' || key === 'R') { keys.r = true; e.preventDefault(); }
            if (key === 'Escape') { togglePause(); e.preventDefault(); }
        });
        document.addEventListener('keyup', (e) => {
            const key = e.key;
            if (key === 'w' || key === 'W') keys.w = false;
            if (key === 'a' || key === 'A') keys.a = false;
            if (key === 's' || key === 'S') keys.s = false;
            if (key === 'd' || key === 'D') keys.d = false;
            if (key === ' ') { keys.space = false; e.preventDefault(); }
            if (key === 'e' || key === 'E') keys.e = false;
            if (key === 'r' || key === 'R') keys.r = false;
        });

        // Углы камеры
        const euler = new THREE.Euler(0, 0, 0, 'YXZ');
        const PI_2 = Math.PI / 2;

        // Мышь (Pointer Lock)
        document.addEventListener('mousemove', (event) => {
            if (document.pointerLockElement !== renderer.domElement) return;
            const movementX = event.movementX || 0;
            const movementY = event.movementY || 0;
            euler.y -= movementX * 0.002;
            euler.x -= movementY * 0.002;
            euler.x = Math.max(-PI_2, Math.min(PI_2, euler.x));
            if (!renderer.xr.isPresenting && !paused) camera.rotation.copy(euler);
        });

        // ===== ГЕЙМПАД =====
        let gamepadConnected = false;
        let gamepadIndex = -1;
        window.addEventListener('gamepadconnected', (e) => {
            gamepadConnected = true;
            gamepadIndex = e.gamepad.index;
            console.log('Геймпад подключён:', e.gamepad.id);
        });
        window.addEventListener('gamepaddisconnected', (e) => {
            gamepadConnected = false;
            gamepadIndex = -1;
            console.log('Геймпад отключён');
        });

        function processGamepad() {
            if (!gamepadConnected || gamepadIndex === -1) return;
            const gp = navigator.getGamepads()[gamepadIndex];
            if (!gp) return;
            const lx = gp.axes[0] || 0;
            const ly = gp.axes[1] || 0;
            moveX = lx;
            moveZ = -ly;
            const rx = gp.axes[2] || 0;
            const ry = gp.axes[3] || 0;
            if (Math.abs(rx) > 0.1 || Math.abs(ry) > 0.1) {
                euler.y -= rx * 0.05;
                euler.x -= ry * 0.05;
                euler.x = Math.max(-PI_2, Math.min(PI_2, euler.x));
                if (!renderer.xr.isPresenting && !paused) camera.rotation.copy(euler);
            }
            const buttons = gp.buttons;
            if (buttons[0] && buttons[0].pressed) jumpPressed = true;
            else jumpPressed = false;
            if (buttons[2] && buttons[2].pressed) actionPressed = true;
            else actionPressed = false;
            if (buttons[3] && buttons[3].pressed) resetPressed = true;
            else resetPressed = false;
            if (gamepadConnected) {
                document.getElementById('gyroIndicator').style.display = 'none';
                document.getElementById('touchControls').classList.remove('active');
            }
        }

        // ===== ГИРОСКОП =====
        let gyroActive = false;
        let gyroAlpha = 0, gyroBeta = 0, gyroGamma = 0;
        let gyroInitialized = false;

        function handleOrientation(event) {
            if (!event.alpha || !event.beta || !event.gamma) return;
            gyroAlpha = event.alpha || 0;
            gyroBeta = event.beta || 0;
            gyroGamma = event.gamma || 0;
            gyroActive = true;
            if (!gyroInitialized) {
                gyroInitialized = true;
                document.getElementById('gyroIndicator').style.display = 'block';
            }
        }

        if (window.DeviceOrientationEvent) {
            if (typeof DeviceOrientationEvent.requestPermission === 'function') {
                DeviceOrientationEvent.requestPermission().then(state => {
                    if (state === 'granted') {
                        window.addEventListener('deviceorientation', handleOrientation);
                    }
                }).catch(err => console.warn('Гироскоп не доступен:', err));
            } else {
                window.addEventListener('deviceorientation', handleOrientation);
            }
        }

        function processGyro() {
            if (!gyroActive) return;
            if (!gamepadConnected && !renderer.xr.isPresenting && !paused) {
                const alphaRad = gyroAlpha * Math.PI / 180;
                const betaRad = gyroBeta * Math.PI / 180;
                euler.y = alphaRad;
                euler.x = -betaRad * 0.8;
                euler.x = Math.max(-PI_2, Math.min(PI_2, euler.x));
                camera.rotation.copy(euler);
            }
        }

        // ===== VR =====
        btnVR.addEventListener('click', () => {
            if (!navigator.xr) {
                alert('Ваш браузер не поддерживает WebXR (VR).');
                return;
            }
            navigator.xr.requestSession('immersive-vr', { optionalFeatures: ['local-floor'] })
                .then(session => {
                    renderer.xr.setSession(session);
                    if (!gameStarted) startGame();
                    btnVR.textContent = '🥽 Выйти из VR';
                    btnVR.onclick = () => {
                        session.end();
                        renderer.xr.setSession(null);
                        btnVR.textContent = '🥽 VR';
                        btnVR.onclick = () => { /* перезапуск VR */ };
                    };
                })
                .catch(err => {
                    alert('Не удалось войти в VR-режим: ' + err.message);
                });
        });

        // ===== МЕНЮ ПАУЗЫ =====
        let paused = false;
        const pauseMenu = document.getElementById('pauseMenu');
        const pauseBtn = document.getElementById('pauseBtn');
        const pauseResume = document.getElementById('pauseResume');
        const pauseSettings = document.getElementById('pauseSettings');
        const pauseExit = document.getElementById('pauseExit');

        function togglePause() {
            if (!gameStarted) return;
            paused = !paused;
            pauseMenu.classList.toggle('show', paused);
            // Пауза: останавливаем физику (проверяем в updatePhysics)
        }

        pauseBtn.addEventListener('click', togglePause);
        pauseResume.addEventListener('click', togglePause);
        pauseSettings.addEventListener('click', () => alert('⚙ Настройки (демо)'));
        pauseExit.addEventListener('click', () => {
            if (confirm('Выйти в главное меню?')) {
                paused = false;
                pauseMenu.classList.remove('show');
                gameStarted = false;
                mainMenu.classList.remove('hidden');
                document.getElementById('ui').style.display = 'none';
                document.getElementById('crosshair').style.display = 'none';
                document.getElementById('controls-hint').style.display = 'none';
                document.getElementById('portalButtons').style.display = 'none';
                document.getElementById('pauseBtn').style.display = 'none';
                // Удалить порталы
                if (portalBlue) { scene.remove(portalBlue); portalBlue = null; }
                if (portalOrange) { scene.remove(portalOrange); portalOrange = null; }
                if (portalPurple) { scene.remove(portalPurple); portalPurple = null; }
                // Очистка уровня
                // Восстанавливаем главное меню
            }
        });

        // ============================================================
        //  ОБНОВЛЕНИЕ ВВОДА
        // ============================================================
        function updateInput() {
            if (paused) {
                moveX = 0; moveZ = 0; jumpPressed = false; actionPressed = false; resetPressed = false;
                return;
            }
            if (gamepadConnected) {
                // уже обработано в processGamepad
                return;
            }
            const isMobile = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
            if (isMobile && !gamepadConnected) {
                moveX = joyX;
                moveZ = joyY;
                jumpPressed = touchJump;
                actionPressed = touchAction;
                resetPressed = touchReset;
            } else {
                moveX = (keys.d ? 1 : 0) - (keys.a ? 1 : 0);
                moveZ = (keys.w ? 1 : 0) - (keys.s ? 1 : 0);
                jumpPressed = keys.space;
                actionPressed = keys.e;
                resetPressed = keys.r;
            }
        }

        // ============================================================
        //  МОБИЛЬНОЕ УПРАВЛЕНИЕ
        // ============================================================
        let joyX = 0, joyY = 0;
        let touchJump = false, touchAction = false, touchReset = false;
        let joystickActive = false, joystickId = null;
        let touchLookActive = false, lastTouchX = 0, lastTouchY = 0;

        const joystick = document.getElementById('joystick');
        const knob = document.getElementById('joystickKnob');

        function updateJoystick(touch) {
            const rect = joystick.getBoundingClientRect();
            const cx = rect.left + rect.width/2;
            const cy = rect.top + rect.height/2;
            let dx = touch.clientX - cx;
            let dy = touch.clientY - cy;
            const maxR = rect.width/2 - 20;
            const dist = Math.sqrt(dx*dx + dy*dy);
            if (dist > maxR) {
                dx = (dx / dist) * maxR;
                dy = (dy / dist) * maxR;
            }
            joyX = dx / maxR;
            joyY = -dy / maxR;
            knob.style.transform = `translate(${dx}px, ${dy}px)`;
        }

        joystick.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.changedTouches[0];
            joystickId = touch.identifier;
            joystickActive = true;
            updateJoystick(touch);
        }, { passive: false });
        joystick.addEventListener('touchmove', (e) => {
            e.preventDefault();
            if (!joystickActive) return;
            for (let touch of e.changedTouches) {
                if (touch.identifier === joystickId) updateJoystick(touch);
            }
        }, { passive: false });
        joystick.addEventListener('touchend', (e) => {
            e.preventDefault();
            joystickActive = false;
            joyX = 0; joyY = 0;
            knob.style.transform = 'translate(-50%, -50%)';
        }, { passive: false });
        joystick.addEventListener('touchcancel', (e) => {
            joystickActive = false;
            joyX = 0; joyY = 0;
            knob.style.transform = 'translate(-50%, -50%)';
        }, { passive: false });

        const touchLookEl = document.getElementById('touchLook');
        touchLookEl.addEventListener('touchstart', (e) => {
            e.preventDefault();
            const touch = e.changedTouches[0];
            touchLookActive = true;
            lastTouchX = touch.clientX;
            lastTouchY = touch.clientY;
        }, { passive: false });
        touchLookEl.addEventListener('touchmove', (e) => {
            e.preventDefault();
            if (!touchLookActive) return;
            for (let touch of e.changedTouches) {
                const dx = touch.clientX - lastTouchX;
                const dy = touch.clientY - lastTouchY;
                lastTouchX = touch.clientX;
                lastTouchY = touch.clientY;
                euler.y -= dx * 0.005;
                euler.x -= dy * 0.005;
                euler.x = Math.max(-PI_2, Math.min(PI_2, euler.x));
                if (!renderer.xr.isPresenting && !paused) camera.rotation.copy(euler);
            }
        }, { passive: false });
        touchLookEl.addEventListener('touchend', (e) => { e.preventDefault(); touchLookActive = false; }, { passive: false });
        touchLookEl.addEventListener('touchcancel', (e) => { touchLookActive = false; }, { passive: false });

        document.getElementById('touchJump').addEventListener('touchstart', (e) => { e.preventDefault(); touchJump = true; }, { passive: false });
        document.getElementById('touchJump').addEventListener('touchend', (e) => { e.preventDefault(); touchJump = false; }, { passive: false });
        document.getElementById('touchJump').addEventListener('touchcancel', (e) => { touchJump = false; }, { passive: false });

        document.getElementById('touchAction').addEventListener('touchstart', (e) => { e.preventDefault(); touchAction = true; }, { passive: false });
        document.getElementById('touchAction').addEventListener('touchend', (e) => { e.preventDefault(); touchAction = false; }, { passive: false });
        document.getElementById('touchAction').addEventListener('touchcancel', (e) => { touchAction = false; }, { passive: false });

        document.getElementById('touchReset').addEventListener('touchstart', (e) => { e.preventDefault(); touchReset = true; }, { passive: false });
        document.getElementById('touchReset').addEventListener('touchend', (e) => { e.preventDefault(); touchReset = false; }, { passive: false });
        document.getElementById('touchReset').addEventListener('touchcancel', (e) => { touchReset = false; }, { passive: false });

        // ============================================================
        //  ФИЗИКА И ЛОГИКА
        // ============================================================
        function updatePhysics(delta) {
            if (!levelData || paused) return;

            updateInput();
            processGamepad();
            processGyro();
            updatePurplePortal(delta);

            if (resetPressed) {
                buildLevel(currentLevelIndex);
                resetPressed = false;
                return;
            }

            // Движение
            const forward = new THREE.Vector3(0, 0, -1);
            forward.applyQuaternion(camera.quaternion);
            forward.y = 0;
            forward.normalize();

            const right = new THREE.Vector3(1, 0, 0);
            right.applyQuaternion(camera.quaternion);
            right.y = 0;
            right.normalize();

            const moveVec = new THREE.Vector3(0, 0, 0);
            moveVec.addScaledVector(forward, moveZ);
            moveVec.addScaledVector(right, moveX);
            if (moveVec.length() > 1) moveVec.normalize();
            moveVec.multiplyScalar(MOVE_SPEED);

            playerPhysics.velocity.x = moveVec.x;
            playerPhysics.velocity.z = moveVec.z;

            if (jumpPressed && playerPhysics.onGround) {
                playerPhysics.velocity.y = JUMP_SPEED;
                playerPhysics.onGround = false;
            }

            playerPhysics.velocity.y += GRAVITY * delta;

            const newPos = playerGroup.position.clone();
            newPos.x += playerPhysics.velocity.x * delta;
            newPos.y += playerPhysics.velocity.y * delta;
            newPos.z += playerPhysics.velocity.z * delta;

            const playerBox = new THREE.Box3(
                new THREE.Vector3(newPos.x - PLAYER_RADIUS, newPos.y, newPos.z - PLAYER_RADIUS),
                new THREE.Vector3(newPos.x + PLAYER_RADIUS, newPos.y + PLAYER_HEIGHT, newPos.z + PLAYER_RADIUS)
            );

            playerPhysics.onGround = false;
            for (let plat of levelObjects.platforms) {
                const platBox = new THREE.Box3().setFromObject(plat);
                if (playerBox.intersectsBox(platBox)) {
                    const overlapX = Math.min(playerBox.max.x - platBox.min.x, platBox.max.x - playerBox.min.x);
                    const overlapY = Math.min(playerBox.max.y - platBox.min.y, platBox.max.y - playerBox.min.y);
                    const overlapZ = Math.min(playerBox.max.z - platBox.min.z, platBox.max.z - playerBox.min.z);

                    if (overlapX < overlapY && overlapX < overlapZ) {
                        if (playerPhysics.velocity.x > 0) newPos.x = platBox.min.x - PLAYER_RADIUS;
                        else newPos.x = platBox.max.x + PLAYER_RADIUS;
                        playerPhysics.velocity.x = 0;
                    } else if (overlapZ < overlapX && overlapZ < overlapY) {
                        if (playerPhysics.velocity.z > 0) newPos.z = platBox.min.z - PLAYER_RADIUS;
                        else newPos.z = platBox.max.z + PLAYER_RADIUS;
                        playerPhysics.velocity.z = 0;
                    } else {
                        if (playerPhysics.velocity.y > 0) {
                            newPos.y = platBox.min.y - PLAYER_HEIGHT;
                            playerPhysics.velocity.y = 0;
                        } else {
                            newPos.y = platBox.max.y;
                            playerPhysics.velocity.y = 0;
                            playerPhysics.onGround = true;
                        }
                    }
                }
            }

            if (newPos.y < -5) {
                buildLevel(currentLevelIndex);
                return;
            }

            playerGroup.position.copy(newPos);
            if (!renderer.xr.isPresenting && !paused) {
                camera.position.copy(playerGroup.position);
                camera.position.y += PLAYER_HEIGHT;
                camera.rotation.copy(euler);
            }

            // === ДИНАМИЧЕСКИЕ ПОРТАЛЫ (телепортация) ===
            // Проверка пересечения с синим порталом
            if (portalBlue) {
                const blueBox = new THREE.Box3().setFromObject(portalBlue);
                const playerPos = playerGroup.position;
                if (blueBox.containsPoint(playerPos) && portalOrange) {
                    // Телепорт к оранжевому
                    const orangePos = portalOrange.position.clone();
                    playerGroup.position.set(orangePos.x, orangePos.y + 0.5, orangePos.z);
                    playerPhysics.velocity.set(0, 0, 0);
                    // Небольшое смещение, чтобы не застрять
                }
            }
            if (portalOrange) {
                const orangeBox = new THREE.Box3().setFromObject(portalOrange);
                const playerPos = playerGroup.position;
                if (orangeBox.containsPoint(playerPos) && portalBlue) {
                    const bluePos = portalBlue.position.clone();
                    playerGroup.position.set(bluePos.x, bluePos.y + 0.5, bluePos.z);
                    playerPhysics.velocity.set(0, 0, 0);
                }
            }
            // Фиолетовый портал: при пересечении возвращает на 2 секунды назад (симуляция)
            if (portalPurple) {
                const purpleBox = new THREE.Box3().setFromObject(portalPurple);
                const playerPos = playerGroup.position;
                if (purpleBox.containsPoint(playerPos)) {
                    // Сохраняем предыдущую позицию (упрощённо: откатываем на 2 секунды)
                    // В реальности нужно хранить историю, но для демо просто телепортируем в начальную позицию уровня
                    playerGroup.position.set(0, 2, 0);
                    playerPhysics.velocity.set(0, 0, 0);
                    // Удаляем фиолетовый портал
                    scene.remove(portalPurple);
                    portalPurple = null;
                    document.getElementById('portalPurpleBtn').classList.remove('active');
                }
            }

            // === КУБЫ ===
            for (let cube of cubesData) {
                if (cube.carried) {
                    const offset = new THREE.Vector3(0, 0.2, 0.8);
                    offset.applyQuaternion(camera.quaternion);
                    cube.mesh.position.copy(playerGroup.position.clone().add(offset));
                    continue;
                }
                if (!cube.onButton) {
                    cube.velocity.y += GRAVITY * delta;
                    const pos = cube.mesh.position.clone();
                    pos.x += cube.velocity.x * delta || 0;
                    pos.y += cube.velocity.y * delta;
                    pos.z += cube.velocity.z * delta || 0;

                    const cubeBox = new THREE.Box3().setFromObject(cube.mesh);
                    for (let plat of levelObjects.platforms) {
                        const platBox = new THREE.Box3().setFromObject(plat);
                        if (cubeBox.intersectsBox(platBox)) {
                            if (cube.velocity.y < 0) {
                                pos.y = platBox.max.y + cube.size[1]/2;
                                cube.velocity.y = 0;
                            } else {
                                pos.y = platBox.min.y - cube.size[1]/2;
                                cube.velocity.y = 0;
                            }
                        }
                    }
                    if (pos.y < -5) {
                        buildLevel(currentLevelIndex);
                        return;
                    }
                    cube.mesh.position.copy(pos);

                    for (let i = 0; i < buttonsData.length; i++) {
                        const btn = buttonsData[i];
                        const btnBox = new THREE.Box3(
                            new THREE.Vector3(btn.pos.x - btn.size[0]/2, btn.pos.y - btn.size[1]/2, btn.pos.z - btn.size[2]/2),
                            new THREE.Vector3(btn.pos.x + btn.size[0]/2, btn.pos.y + btn.size[1]/2, btn.pos.z + btn.size[2]/2)
                        );
                        if (cubeBox.intersectsBox(btnBox)) {
                            cube.onButton = true;
                            cube.mesh.position.y = btn.pos.y + btn.size[1]/2 + cube.size[1]/2;
                            cube.velocity.y = 0;
                            btn.pressed = true;
                            const door = doorsData[btn.targetDoorIndex];
                            if (door) {
                                door.open = true;
                                door.mesh.material.color.setHex(0x44aa44);
                            }
                            break;
                        }
                    }
                }
            }

            for (let btn of buttonsData) {
                let isPressed = false;
                for (let cube of cubesData) {
                    if (cube.onButton) {
                        const cubeBox = new THREE.Box3().setFromObject(cube.mesh);
                        const btnBox = new THREE.Box3(
                            new THREE.Vector3(btn.pos.x - btn.size[0]/2, btn.pos.y - btn.size[1]/2, btn.pos.z - btn.size[2]/2),
                            new THREE.Vector3(btn.pos.x + btn.size[0]/2, btn.pos.y + btn.size[1]/2, btn.pos.z + btn.size[2]/2)
                        );
                        if (cubeBox.intersectsBox(btnBox)) {
                            isPressed = true;
                            break;
                        }
                    }
                }
                if (!isPressed) {
                    btn.pressed = false;
                    const door = doorsData[btn.targetDoorIndex];
                    if (door) {
                        door.open = false;
                        door.mesh.material.color.setHex(0x884444);
                    }
                }
            }

            if (actionPressed) {
                let closestCube = null;
                let closestDist = Infinity;
                const playerPos = playerGroup.position;
                for (let cube of cubesData) {
                    if (cube.carried) {
                        cube.carried = false;
                        const dir = new THREE.Vector3(0, 0, 1);
                        dir.applyQuaternion(camera.quaternion);
                        cube.velocity.set(dir.x * 4, 1, dir.z * 4);
                        break;
                    } else if (!cube.onButton) {
                        const dist = playerPos.distanceTo(cube.mesh.position);
                        if (dist < 2.5 && dist < closestDist) {
                            closestDist = dist;
                            closestCube = cube;
                        }
                    }
                }
                if (closestCube && !closestCube.carried) {
                    closestCube.carried = true;
                    closestCube.velocity.set(0, 0, 0);
                }
                actionPressed = false;
            }

            // Цель
            const goal = levelObjects.goal;
            if (goal) {
                const goalBox = new THREE.Box3().setFromObject(goal);
                const playerPos = playerGroup.position;
                if (goalBox.containsPoint(playerPos)) {
                    let allCubesPlaced = true;
                    if (levelData.requireAllCubes) {
                        for (let btn of buttonsData) {
                            if (!btn.pressed) allCubesPlaced = false;
                        }
                    }
                    if (allCubesPlaced) {
                        document.getElementById('levelComplete').classList.add('show');
                        document.getElementById('completeTitle').textContent = '🎉 Уровень пройден!';
                        document.getElementById('completeMsg').textContent = 'Отлично! Переходите к следующему.';
                        document.getElementById('nextLevelBtn').textContent = '➡️ Далее';
                        document.getElementById('nextLevelBtn').onclick = () => {
                            buildLevel(currentLevelIndex + 1);
                        };
                    } else {
                        document.getElementById('message').style.display = 'block';
                        document.getElementById('message').textContent = '⚠️ Сначала поставьте все кубы на кнопки!';
                        setTimeout(() => {
                            document.getElementById('message').style.display = 'none';
                        }, 2000);
                    }
                }
            }

            updateUI();
        }

        function updateUI() {
            let placed = 0;
            for (let btn of buttonsData) {
                if (btn.pressed) placed++;
            }
            const total = buttonsData.length;
            document.getElementById('counter').textContent = placed;
            document.getElementById('total').textContent = total;
            document.getElementById('levelNum').textContent = currentLevelIndex + 1;
        }

        // ============================================================
        //  ЗАПУСК ИГРЫ
        // ============================================================
        let gameStarted = false;

        function startGame() {
            if (gameStarted) return;
            gameStarted = true;
            mainMenu.classList.add('hidden');
            document.getElementById('ui').style.display = 'block';
            document.getElementById('crosshair').style.display = 'block';
            document.getElementById('controls-hint').style.display = 'block';
            document.getElementById('portalButtons').style.display = 'flex';
            document.getElementById('pauseBtn').style.display = 'block';

            const isMobile = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
            if (isMobile && !gamepadConnected) {
                document.getElementById('touchControls').classList.add('active');
            }

            buildLevel(0);
            if (!window._animating) {
                window._animating = true;
                animate();
            }

            if (!isMobile) {
                renderer.domElement.addEventListener('click', () => {
                    if (!document.pointerLockElement) {
                        renderer.domElement.requestPointerLock();
                    }
                });
            }
        }

        btnNewGame.addEventListener('click', startGame);

        // ============================================================
        //  ЦИКЛ АНИМАЦИИ
        // ============================================================
        let clock = new THREE.Clock();

        function animate() {
            if (!gameStarted) {
                requestAnimationFrame(animate);
                return;
            }
            const delta = Math.min(clock.getDelta(), 0.05);
            updatePhysics(delta);
            renderer.render(scene, camera);
            requestAnimationFrame(animate);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // VR поддержка
        if (navigator.xr) {
            navigator.xr.isSessionSupported('immersive-vr').then(supported => {
                if (supported) {
                    btnVR.style.display = 'inline-block';
                } else {
                    btnVR.style.display = 'none';
                }
            });
        } else {
            btnVR.style.display = 'none';
        }

        console.log('Portal 3 — Fan Edition. Меню паузы и кнопки порталов добавлены.');
    </script>
</body>
